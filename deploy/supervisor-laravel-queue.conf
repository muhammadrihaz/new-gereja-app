[program:gereja-laravel-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/gereja-gpiyehuda/api/artisan queue:work --sleep=3 --tries=3 --timeout=90
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/gereja-laravel-queue.log
